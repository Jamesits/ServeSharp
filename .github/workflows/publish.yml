name: Publish

on:
  push:
    branches:
      - trunk
    tags:
      - "v*"

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      packages: write
      contents: write
    strategy:
      matrix:
        dotnet-version: [ '8.x' ]

    steps:
